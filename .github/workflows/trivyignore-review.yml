# Periodic .trivyignore review automation - OPS-3 follow-up.
#
# Each Monday at 04:00 UTC (and on demand) parse repo-root .trivyignore via
# api/src/scripts/check-trivyignore.ts. If any entry is past its
# Re-check-by date (or missing/malformed that field), open a GitHub Issue
# with the rendered Markdown report. If an open issue with the canonical
# title already exists, update its body in place instead of opening a new
# one - prevents duplicate-issue noise.
#
# Non-blocking by design: this workflow does NOT fail CI for stale entries
# (urgent security fixes must always be able to land). The Issue is the
# review prompt; the human closes it after updating .trivyignore.
#
# References:
#   docs/DESIGN_IMPROVEMENT_DEEP_ANALYSIS.md OPS-3
#   .trivyignore (machine-readable header documents the required fields)
#   api/src/scripts/check-trivyignore.ts (parser + reporter; 17 unit tests)

name: Trivyignore review

on:
  schedule:
    # Every Monday 04:00 UTC. Weekly cadence catches a missed quarterly
    # review within 7 days of its deadline.
    - cron: "0 4 * * 1"
  workflow_dispatch: {}
  # Also run when .trivyignore itself changes on master, so the next push
  # closing the issue fires the check immediately rather than waiting.
  push:
    branches: [master]
    paths: [".trivyignore"]

permissions:
  contents: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci --no-audit --no-fund

      - name: Run check-trivyignore
        id: check
        working-directory: api
        run: |
          # Capture the Markdown report (stdout) and the STALE_COUNT/OK
          # summary (stderr). The script always exits 0 by design.
          REPORT_PATH="$RUNNER_TEMP/trivyignore-report.md"
          npm run -s check:trivyignore > "$REPORT_PATH" 2> "$RUNNER_TEMP/trivyignore-summary.txt"
          # Surface the summary as outputs.
          STALE_COUNT=$(grep -E '^STALE_COUNT=' "$RUNNER_TEMP/trivyignore-summary.txt" | cut -d= -f2)
          OK=$(grep -E '^OK=' "$RUNNER_TEMP/trivyignore-summary.txt" | cut -d= -f2)
          echo "stale_count=${STALE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "ok=${OK}" >> "$GITHUB_OUTPUT"
          echo "report_path=${REPORT_PATH}" >> "$GITHUB_OUTPUT"
          echo "::group::trivyignore report"
          cat "$REPORT_PATH"
          echo "::endgroup::"

      - name: Open or update review Issue
        if: steps.check.outputs.ok != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPORT_PATH: ${{ steps.check.outputs.report_path }}
          STALE_COUNT: ${{ steps.check.outputs.stale_count }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const title = '[security] .trivyignore review needed';

            // Look for an existing open issue with the canonical title.
            // Updating in place prevents weekly duplicates.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,supply-chain,trivyignore-review',
              per_page: 100,
            });
            const match = existing.data.find(i => i.title === title);

            const footer =
              `\n\n---\n_Auto-generated by .github/workflows/trivyignore-review.yml run #${context.runNumber}._`;
            const fullBody = body + footer;

            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: fullBody,
              });
              core.notice(`Updated existing issue #${match.number} (stale_count=${process.env.STALE_COUNT}).`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: fullBody,
                labels: ['security', 'supply-chain', 'trivyignore-review'],
              });
              core.notice(`Opened issue #${created.data.number} (stale_count=${process.env.STALE_COUNT}).`);
            }

      - name: Auto-close stale Issue once .trivyignore is clean
        if: steps.check.outputs.ok == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = '[security] .trivyignore review needed';
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,supply-chain,trivyignore-review',
              per_page: 100,
            });
            const match = open.data.find(i => i.title === title);
            if (!match) {
              core.notice('No open review issue to close (already clean).');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: `All entries are within their re-check window. Closing automatically (run #${context.runNumber}).`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed',
              state_reason: 'completed',
            });
            core.notice(`Closed issue #${match.number}.`);
