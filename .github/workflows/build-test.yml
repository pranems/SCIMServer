name: Build Test Image

on:
  push:
    branches:
      - 'test/**'
      - 'dev/**'
      - 'feature/**'
      - 'feat/**'
      - 'ci/**'
      - 'fix/**'
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Test tag suffix (e.g., "collision-ui" creates test-collision-ui)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pranems/scimserver

jobs:
  # OPS-1: Same validation gate as build-and-push.yml. Test images cannot
  # be pushed without lint + unit + E2E + web build all passing.
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # prisma.config.ts uses env('DATABASE_URL') which throws at config-load time
    # if the var is missing - even for `prisma generate` which doesn't connect.
    # Tests run with PERSISTENCE_BACKEND=inmemory so the value is never used.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci --no-audit --no-fund

      # Prisma client must be generated BEFORE lint so type-aware ESLint rules
      # (no-redundant-type-constituents, require-await) can resolve @prisma/client
      # types. Without it those types appear as 'error' types and trip lint.
      - name: Generate Prisma client
        working-directory: api
        run: npx prisma generate

      - name: Lint API
        working-directory: api
        run: npm run lint

      # Migration linter - blocks destructive Prisma DDL on new migrations.
      # Historical destructives are accepted via api/prisma/.migration-lint-baseline.json
      # (SHA-256 hash allowlist). Set ALLOW_DESTRUCTIVE_MIGRATION=1 in CI plus
      # justify in the PR description to override for new destructive migrations.
      - name: Lint Prisma migrations (additive-only enforcement)
        working-directory: api
        run: npx ts-node --transpile-only src/scripts/lint-migrations.ts

      - name: Unit tests (API)
        working-directory: api
        run: npm test

      # Two specs filter persistent logs by minDurationMs which the InMemory
      # log repository does not honor. They run against real Prisma backend in
      # the post-deploy live-test suite (scripts/live-test.ps1). Excluded here
      # to keep CI fast and PG-free.
      # --maxWorkers=2 matches the 2-core GitHub-hosted runner. The default
      # config uses 4 workers (faster for local dev with more cores), but on
      # CI the over-subscription causes ECONNRESET in parallel-HTTP tests
      # (multi-endpoint-isolation: 4 simultaneous Promise.all POSTs).
      - name: E2E tests (API, in-memory backend)
        working-directory: api
        run: npm run test:e2e -- --maxWorkers=2 --testPathIgnorePatterns 'endpoint-scoped-logs.e2e-spec.ts' --testPathIgnorePatterns 'log-config.e2e-spec.ts'
        env:
          PERSISTENCE_BACKEND: inmemory
          SCIM_SHARED_SECRET: ci-shared-secret-not-for-production
          JWT_SECRET: ci-jwt-secret-not-for-production
          OAUTH_CLIENT_SECRET: ci-oauth-secret-not-for-production

      - name: Install web dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Test web (Vitest)
        working-directory: web
        run: npm test

      - name: Build web (production bundle)
        working-directory: web
        run: npm run build

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine test tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="test-${{ inputs.test_tag }}"
          else
            # Extract branch name and sanitize for Docker tag
            BRANCH="${GITHUB_REF#refs/heads/}"
            BRANCH_CLEAN=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
            TAG="test-${BRANCH_CLEAN}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building test image with tag: ${TAG}"

      - name: Build and push test image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          build-args: |
            IMAGE_TAG=${{ steps.tag.outputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # OPS-3: Trivy CVE scan on the just-pushed test image. Same gating as
      # build-and-push.yml so test images can never become "well, it scanned
      # clean once when we ran it manually" snowflakes.
      - name: Trivy image scan (HIGH+CRITICAL gating)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      - name: Summary
        run: |
          echo "## Test Image Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test this image:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`powershell" >> $GITHUB_STEP_SUMMARY
          echo "az containerapp update \\" >> $GITHUB_STEP_SUMMARY
          echo "  -n YOUR-APP-NAME \\" >> $GITHUB_STEP_SUMMARY
          echo "  -g YOUR-RESOURCE-GROUP \\" >> $GITHUB_STEP_SUMMARY
          echo "  --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Note: This is a test image - not tagged as \`latest\` and won't trigger update notifications for other users." >> $GITHUB_STEP_SUMMARY
